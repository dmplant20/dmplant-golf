<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable 변형: OS가 모서리를 자유롭게 잘라내도 핵심 요소가 중앙 80% 안전 영역 내 -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%"  stop-color="#1a1410"/>
      <stop offset="60%" stop-color="#0a0807"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8a6a26"/>
      <stop offset="50%"  stop-color="#e8c96d"/>
      <stop offset="100%" stop-color="#8a6a26"/>
    </linearGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f4d97d"/>
      <stop offset="55%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6a26"/>
    </linearGradient>
    <radialGradient id="green" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#2a2010" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0807" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 전체 채움 (모서리 잘려도 안전) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- 핵심 요소는 80% 중앙 영역(좌우상하 51px 마진)에 배치 -->
  <ellipse cx="256" cy="350" rx="160" ry="35" fill="url(#green)"/>
  <path d="M 116 350 Q 256 332 396 350" fill="none"
        stroke="rgba(201,168,76,0.25)" stroke-width="1.5"/>
  <ellipse cx="190" cy="350" rx="13" ry="4.5" fill="#000"/>

  <!-- 깃대 (중앙 안전영역) -->
  <rect x="306" y="160" width="6" height="195" fill="url(#pole)" rx="3"/>
  <circle cx="309" cy="158" r="6" fill="#e8c96d"/>

  <!-- 깃발 -->
  <path d="M 312 168 L 220 192 Q 212 208 220 224 L 312 248 Z" fill="url(#flag)"/>
  <path d="M 312 168 L 268 180 Q 258 204 268 236 L 312 248 Z" fill="rgba(0,0,0,0.12)"/>
</svg>
