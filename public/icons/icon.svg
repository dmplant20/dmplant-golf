<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Inter Stellar GOLF — premium gold-on-black icon -->
  <defs>
    <!-- 배경: 깊은 검정 → 골드 그림자 살짝 -->
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#1a1410"/>
      <stop offset="60%" stop-color="#0a0807"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>

    <!-- 깃대: 골드 메탈릭 -->
    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8a6a26"/>
      <stop offset="50%"  stop-color="#e8c96d"/>
      <stop offset="100%" stop-color="#8a6a26"/>
    </linearGradient>

    <!-- 깃발: 골드 그라디언트 -->
    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f4d97d"/>
      <stop offset="55%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6a26"/>
    </linearGradient>

    <!-- 그린: 살짝 어두운 골드 라인 -->
    <radialGradient id="green" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#2a2010" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0807" stop-opacity="0"/>
    </radialGradient>

    <!-- 깃발 그림자 -->
    <filter id="flagShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 라운드 사각 배경 (마스크 가능 영역 충분히 확보) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 미세한 골드 보더 -->
  <rect x="3" y="3" width="506" height="506" rx="110"
        fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="1.5"/>

  <!-- 그린의 빛 효과 -->
  <ellipse cx="256" cy="380" rx="180" ry="40" fill="url(#green)"/>

  <!-- 그린(잔디 면) — 매우 얇은 골드 호 -->
  <path d="M 96 380 Q 256 360 416 380" fill="none"
        stroke="rgba(201,168,76,0.25)" stroke-width="1.5"/>

  <!-- 홀 (구멍) -->
  <ellipse cx="180" cy="380" rx="14" ry="5" fill="#000"/>
  <ellipse cx="180" cy="378" rx="14" ry="4" fill="rgba(0,0,0,0.6)"/>

  <!-- 깃대 -->
  <rect x="318" y="120" width="6" height="270"
        fill="url(#pole)" rx="3"/>

  <!-- 깃대 끝 (knob) -->
  <circle cx="321" cy="118" r="7" fill="#e8c96d"/>
  <circle cx="321" cy="116" r="3" fill="#fff" fill-opacity="0.4"/>

  <!-- 깃발 (삼각 깃발 — 펄럭이는 형태) -->
  <g filter="url(#flagShadow)">
    <path d="M 324 130
             L 220 158
             Q 210 178 220 198
             L 324 226
             Z"
          fill="url(#flag)"/>
    <!-- 깃발 펄럭 음영 -->
    <path d="M 324 130
             L 270 144
             Q 258 174 270 212
             L 324 226
             Z"
          fill="rgba(0,0,0,0.12)"/>
  </g>

  <!-- 별 (Inter Stellar 컨셉 — 미세한 별 점들) -->
  <g fill="#e8c96d" opacity="0.7">
    <circle cx="128" cy="140" r="1.6"/>
    <circle cx="84" cy="200" r="1.2"/>
    <circle cx="148" cy="260" r="1"/>
    <circle cx="420" cy="280" r="1.4"/>
    <circle cx="440" cy="180" r="1"/>
  </g>

  <!-- 큰 별 1개 (포인트) -->
  <g transform="translate(108 230) rotate(0)" opacity="0.8">
    <path d="M 0 -7 L 1.5 -1.5 L 7 0 L 1.5 1.5 L 0 7 L -1.5 1.5 L -7 0 L -1.5 -1.5 Z"
          fill="#f4d97d"/>
  </g>
</svg>
